spring.application.name=mini-project
# Database
# ${ENVIROMENT_VARIABLE}
spring.datasource.url=jdbc:mysql://localhost:3306/${DB_NAME}?useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# Hibernate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.default_batch_fetch_size=500
# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
# JWT
application.security.jwt.secret-key=${JWT_SECRET_KEY}
application.security.jwt.expiration=86400000
# 86400000 (ms) = 24h
# ============================================================
# Spring Mail
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
# ============================================================
# Redis & Cache
spring.cache.type=redis
spring.data.redis.host=localhost
spring.data.redis.port=6379
# Cache TTL (ms) -> 1h = 3600000ms
spring.cache.redis.time-to-live=3600000

