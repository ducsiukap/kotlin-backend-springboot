spring.application.name=mini-project
# Database
# ${ENVIROMENT_VARIABLE}
spring.datasource.url=jdbc:mysql://localhost:3306/${DB_NAME}?useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# Hibernate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.default_batch_fetch_size=500
# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
# JWT
application.security.jwt.secret-key=${JWT_SECRET_KEY}
application.security.jwt.expiration=86400000
# 86400000 (ms) = 24h
# ============================================================
# Spring Mail
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
# ============================================================
# Redis Cache + Redis for Rate limiting
spring.cache.type=redis
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.connect-timeout=150ms
spring.data.redis.timeout=150ms
spring.data.redis.lettuce.pool.max-active=100
spring.data.redis.lettuce.pool.max-idle=50
spring.data.redis.lettuce.pool.min-idle=10
# Cache TTL (ms) -> 1h = 3600000ms
spring.cache.redis.time-to-live=3600000
# ============================================================
# Logging
# Th? m?c v‡ tÍn file log. Th?ng Spring s? t? t?o th? m?c 'logs' ? th? m?c g?c d? ·n.
logging.file.name=logs/mini-project.log
# c?t file -> c?t file m?i khi file log > 10MB
logging.logback.rollingpolicy.max-file-size=10MB
# xÛa log sau 30 ng‡y
logging.logback.rollingpolicy.max-history=30
# log-level: m?c ??nh ch? in ? m?c INFO tr? lÍn
logging.level.root=INFO
# -> riÍng project cho log ? m?c debug ?? g? l?i
logging.level.com.vduczz.mini_project=DEBUG
# ============================================================
# Actuator
#   B?t to‡n b? c·c c?ng theo di ?n (health, info, metrics, env...)
management.endpoints.web.exposure.include=health,info,metrics
#   Hi?n th? chi ti?t tÏnh tr?ng c?a Database, Redis, Disk Space
management.endpoint.health.show-details=always