services:
  # RabbitMQ
  rabbitmq:
    image: rabbitmq:3-management # 3-management: có giao diện web
    ports:
      - "5672:5672" # gửi/nhận message
      - "15672:15672" # web
    environment:
      # username+pass để vào broker
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: secure_password
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - rabbitmq_log:/var/lib/rabbitmq

  # Kafka
  # với phiên bản cũ, kafka cần zookeeper
  #  zookeeper:
  #    image: confluentinc/cp-zookeeper
  #    environment:
  #      ZOOKEEPER_CLIENT_PORT: 2181
  kafka:
    image: apache/kafka:latest
    ports:
      - "9092:9092"
    environment:
      # KRaft
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller # KRaft: vừa là broker, vừa là controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      # cho phép tự tạo topic khi có người publish mà chưa khai báo trước
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      # for zookeeper
      #      - KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      #      - KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
#    volumes:
#     - kafka-data:/var/lib/kafka/data

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    depends_on:
      - kafka
    ports:
      - "9090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

volumes:
  # rabbitmq
  rabbitmq_data:
  rabbitmq_log:
  # kafka
#  kafka_data: